# .tmux.conf — sensible tmux configuration

# ── prefix key: Ctrl-a (screen-style, easier than Ctrl-b) ────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── general ───────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true colour

set -g history-limit 50000
set -g buffer-limit 20
set -sg escape-time 0           # no delay for Escape key
set -g display-time 1500
set -g focus-events on
set -g mouse on                 # enable mouse support

set -g base-index 1             # windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on      # renumber when a window is closed

# ── key bindings ──────────────────────────────────────────────────────────────

# reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# intuitive splits (open in current dir)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes with Shift+arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# new window in current dir
bind c new-window -c "#{pane_current_path}"

# copy mode
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# ── status bar ────────────────────────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom

# colours (gruvbox-inspired)
BG="#282828"
FG="#ebdbb2"
GRAY="#928374"
YELLOW="#fabd2f"
GREEN="#b8bb26"
BLUE="#83a598"

set -g status-style "bg=$BG,fg=$FG"
set -g status-left-length 40
set -g status-right-length 80

set -g status-left "#[fg=$GREEN,bold] #S #[fg=$GRAY]│ "
set -g status-right "#[fg=$GRAY]%H:%M #[fg=$GRAY]│ #[fg=$YELLOW]#H "

setw -g window-status-format "#[fg=$GRAY] #I:#W "
setw -g window-status-current-format "#[fg=$YELLOW,bold] #I:#W "

# pane borders
set -g pane-border-style "fg=$GRAY"
set -g pane-active-border-style "fg=$BLUE"

# ── plugins (TPM) ─────────────────────────────────────────────────────────────
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto save/restore
set -g @plugin 'tmux-plugins/tmux-yank'         # system clipboard yank

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'

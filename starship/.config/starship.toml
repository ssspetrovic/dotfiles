# starship.toml вҖ” cross-shell prompt configuration
# Docs: https://starship.rs/config/

# в”Җв”Җ global в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true
command_timeout = 500

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$python\
$node\
$rust\
$golang\
$java\
$ruby\
$terraform\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

# в”Җв”Җ os icon в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
style = "bold dimmed white"

[os.symbols]
Ubuntu  = " "
Fedora  = " "
Macos   = " "
Unknown = " "

# в”Җв”Җ username (only shown when relevant) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always = false
style_user  = "bold yellow"
style_root  = "bold red"
format      = "[$user]($style) "

# в”Җв”Җ hostname (only shown over SSH) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[hostname]
ssh_only = true
style    = "bold green"
format   = "[@$hostname]($style) "

# в”Җв”Җ directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style             = "bold blue"
format            = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncate_to_repo  = true
read_only         = " у°Ңҫ"

[directory.substitutions]
"~/dotfiles" = "уұӮө dotfiles"
"~"          = "~"

# в”Җв”Җ git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = " "
style  = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "

[git_status]
style     = "bold red"
format    = "([$all_status$ahead_behind]($style) )"
ahead     = "вҮЎ${count}"
behind    = "вҮЈ${count}"
diverged  = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
staged    = "[+${count}](green) "
modified  = "[~${count}](yellow) "
untracked = "[?${count}](blue) "
deleted   = "[-${count}](red) "
stashed   = "[*${count}](cyan) "
conflicted = "[=${count}](red) "

[git_state]
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "
style  = "bold yellow"

# в”Җв”Җ runtimes (only shown when relevant files exist) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[python]
symbol = " "
style  = "bold yellow"
format = "[$symbol$pyenv_prefix($version )($virtualenv )]($style)"
detect_files = ["requirements.txt", "pyproject.toml", "setup.py", ".python-version"]

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[rust]
symbol = " "
style  = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style  = "bold cyan"
format = "[$symbol($version )]($style)"

[java]
symbol = " "
style  = "bold red"
format = "[$symbol($version )]($style)"

[ruby]
symbol = " "
style  = "bold red"
format = "[$symbol($version )]($style)"

[terraform]
symbol = "уұҒў "
style  = "bold purple"
format = "[$symbol$workspace]($style) "

[docker_context]
symbol = " "
style  = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = true

# в”Җв”Җ misc в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[jobs]
symbol    = " "
style     = "bold blue"
threshold = 1
format    = "[$symbol$number]($style) "

[cmd_duration]
min_time           = 2_000     # show if command took > 2s
style              = "bold yellow"
format             = "[уұҺ« $duration]($style) "
show_notifications = false

[character]
success_symbol = "[вқҜ](bold green)"
error_symbol   = "[вқҜ](bold red)"
vimcmd_symbol  = "[вқ®](bold green)"
